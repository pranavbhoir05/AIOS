
services:
  mongodb:
    image: mongo:latest
    container_name: aios_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - aios_network

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongodb
    volumes:
      - ./src:/app/src
    networks:
      - aios_network

networks:
  aios_network:
    driver: bridge

volumes:
  mongodb_data:
